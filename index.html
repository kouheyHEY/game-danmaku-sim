<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>danmaku-sim</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; background: #0b0d12; }
      body {
        /* スマホでのスクロール/バウンス/プルリフレッシュを殺す */
        position: fixed; inset: 0; overflow: hidden; overscroll-behavior: none;
        display: flex; align-items: center; justify-content: center;
        font-family: system-ui, sans-serif;
        touch-action: none;
        -webkit-user-select: none; user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
      }
      #app { position: relative; line-height: 0; }
      #app canvas {
        outline: none; display: block; box-shadow: 0 0 0 1px #1e2330;
        touch-action: none; -webkit-touch-callout: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/app/main.ts"></script>
  </body>
</html>
